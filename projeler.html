<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çalışmalarım | Yazılım Geliştirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0014; color: white; }
        .neon-text { text-shadow: 0 0 10px #a020f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 glass border-b border-purple-900/50">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-white">
                <a href="index.html"><span class="text-purple-500 underline decoration-2">YAZILIMCI</span>.DEV</a>
            </div>
            <ul class="flex space-x-8 font-medium">
                <li><a href="index.html" class="hover:text-purple-400 transition">Ana Sayfa</a></li>
                <li><a href="projeler.html" class="text-purple-400">Çalışmalarım</a></li>
            </ul>
        </nav>
    </header>

    <main class="pt-40 pb-20 px-6 max-w-6xl mx-auto">
        <div class="mb-16">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4 neon-text">Çalışmalarım</h1>
            <p class="text-gray-400 text-lg">Geliştirdiğim projeler, kullandığım teknolojiler ve çözüm süreçlerim.</p>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="glass rounded-2xl overflow-hidden border border-white/5 hover:border-purple-500 transition duration-500 p-2">
                <div class="h-48 rounded-xl bg-gradient-to-br from-purple-900/40 to-black flex items-center justify-center mb-6">
                    <span class="text-purple-500 text-3xl font-bold tracking-widest">E-TİCARET</span>
                </div>
                <div class="px-4 pb-6">
                    <h3 class="text-xl font-bold mb-2">Modern Shop UI</h3>
                    <p class="text-gray-400 text-sm mb-4 font-light leading-relaxed">Next.js ve Tailwind CSS kullanılarak hazırlanmış, yüksek dönüşüm odaklı tasarım.</p>
                    <div class="flex gap-2">
                        <span class="px-2 py-1 bg-purple-900/30 text-purple-400 text-[10px] rounded uppercase font-bold">React</span>
                        <span class="px-2 py-1 bg-purple-900/30 text-purple-400 text-[10px] rounded uppercase font-bold">Tailwind</span>
                    </div>
                </div>
            </div>

            <div class="glass rounded-2xl overflow-hidden border border-white/5 hover:border-purple-500 transition duration-500 p-2 italic text-gray-500 flex items-center justify-center">
                Yeni projeler ekleniyor...
             </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-white/5 text-gray-600">
        <a href="index.html" class="hover:text-purple-400 transition">← Ana Sayfaya Dön</a>
    </footer>
<button id="scrollToTop" class="fixed bottom-8 right-8 z-[60] p-4 bg-purple-600 text-white rounded-full shadow-[0_0_20px_rgba(160,32,240,0.5)] opacity-0 invisible transition-all duration-300 hover:bg-purple-700 hover:scale-110">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
    </svg>
</button>
</body>
</html>
