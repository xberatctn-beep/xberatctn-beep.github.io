<!DOCTYPE html>
<html lang="tr" class="scroll-smooth" style="background-color: #0b0014;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projelerim | Berat Çetin</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .neon-text { text-shadow: 0 0 10px #a020f0, 0 0 20px #a020f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(0, 0, 0, 0.2); }
        @keyframes spin-custom { to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-custom 1s linear infinite; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-[#0b0014] dark:text-gray-200 leading-relaxed overflow-x-hidden">

    <div id="preloader" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0b0014] transition-opacity duration-700">
        <div class="relative flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-purple-900/20 border-t-purple-500 rounded-full animate-spin-slow"></div>
            <p class="mt-4 text-purple-400 font-bold tracking-widest text-xs uppercase animate-pulse">Yükleniyor</p>
        </div>
    </div>

    <header class="fixed top-0 w-full z-50 glass border-b border-purple-900/50">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold dark:text-white text-gray-900">
                <a href="index.html"><span class="text-purple-500 underline underline-offset-4 decoration-2">Cetin</span>.Digital</a>
            </div>

            <ul class="hidden md:flex items-center space-x-8 font-medium">
                <li><a href="index.html" class="hover:text-purple-400 transition">Ana Sayfa</a></li>
                <li><a href="projeler.html" class="text-purple-500 font-bold">Projelerim</a></li>
                <li><a href="privacy.html" class="hover:text-purple-400 transition">Privacy & Terms</a></li>
                
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:border-purple-500 transition-all flex items-center justify-center min-w-[44px] min-h-[44px]">
                    <span class="dark:hidden text-xl">🌙</span>
                    <span class="hidden dark:inline text-xl">☀️</span>
                </button>
            </ul>

            <div class="flex items-center md:hidden gap-4">
                <button id="mobile-theme-toggle" class="p-2 rounded-lg bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 flex items-center justify-center min-w-[44px] min-h-[44px]">
                    <span class="dark:hidden text-xl">🌙</span>
                    <span class="hidden dark:inline text-xl">☀️</span>
                </button>
                <button id="menu-btn" class="text-gray-900 dark:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>
        </nav>

        <div id="mobile-menu" class="hidden md:hidden absolute w-full bg-white dark:bg-[#0b0014] border-b border-purple-900/50 px-6 py-8 space-y-6 shadow-2xl">
            <a href="index.html" class="block text-lg hover:text-purple-500 transition text-center">Ana Sayfa</a>
            <a href="projeler.html" class="block text-lg text-purple-500 font-bold text-center">Projelerim</a>
            <a href="privacy.html" class="block text-lg hover:text-purple-500 transition text-center">Privacy & Terms</a>
        </div>
    </header>

    <main class="pt-40 pb-20 px-6 max-w-6xl mx-auto min-h-screen">
        <div class="mb-16">
            <h1 class="text-4xl md:text-6xl font-black mb-4 dark:text-white text-gray-900 neon-text">Projelerim</h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg">Geliştirme sürecindeki projelerim ve teknoloji odaklarım.</p>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="glass rounded-2xl overflow-hidden border border-gray-200 dark:border-white/5 hover:border-purple-500 transition duration-500 p-2 group shadow-sm">
                <div class="h-48 rounded-xl bg-gradient-to-br from-gray-900 to-purple-900 flex flex-col items-center justify-center mb-6 overflow-hidden relative">
                    <span class="text-white text-2xl font-black tracking-tighter z-10 group-hover:scale-110 transition duration-500 uppercase text-center px-4">ARAÇ SİMÜLASYONU</span>
                </div>
                <div class="px-4 pb-6">
                    <h3 class="text-xl font-bold dark:text-white text-gray-900 mb-2">Mobil Araba Simulasyonu</h3>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Unity ve C# ile geliştirilen simülasyon projesi.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-gray-200 dark:border-white/5 text-gray-500">
        <a href="index.html" class="hover:text-purple-400 transition flex items-center justify-center gap-2">
            <span>←</span> Ana Sayfaya Dön
        </a>
    </footer>

    <script>
        // Preloader Safeguard
        function closeLoader() {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                preloader.style.opacity = '0';
                setTimeout(() => { preloader.style.display = 'none'; }, 700);
            }
        }
        window.addEventListener('load', closeLoader);
        setTimeout(closeLoader, 1500);

        // Menü
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

        // Tema Yönetimi
        const themeBtn = document.getElementById('theme-toggle');
        const mobileThemeBtn = document.getElementById('mobile-theme-toggle');

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
        }

        themeBtn.addEventListener('click', toggleTheme);
        mobileThemeBtn.addEventListener('click', toggleTheme);

        // Sayfa açıldığında tema kontrolü
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
