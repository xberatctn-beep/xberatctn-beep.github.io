<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Cetin.Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- ANA SAYFA İLE AYNI STİLLER --- */
        :root { --bg-color: #0f172a; --text-color: #f8fafc; --accent-color: #8b5cf6; --card-bg: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); }

        nav {
            position: fixed; width: 100%; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent-color); }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .doviz-kapsayici {
            width: 150px; overflow: hidden; background: rgba(255,255,255,0.05);
            border-radius: 20px; padding: 5px 10px; border: 1px solid rgba(139,92,246,0.3);
        }
        .kayan-metin {
            display: flex; white-space: nowrap; font-size: 12px; color: #00ff88;
            animation: kaydir 10s linear infinite;
        }
        @keyframes kaydir { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- BLOG İÇERİK --- */
        .blog-container { max-width: 1200px; margin: 0 auto; padding: 120px 20px; }
        .blog-header { text-align: center; margin-bottom: 50px; }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .blog-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer;
        }
        .blog-card:hover { transform: translateY(-10px); border-color: var(--accent-color); }
        .blog-img { height: 200px; width: 100%; object-fit: cover; }
        .blog-content { padding: 20px; }
        .blog-content h3 { margin-bottom: 10px; color: #fff; }
        .blog-content p { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Cetin<span>.Digital</span></a>
        <div class="nav-right">
            <div class="doviz-kapsayici"><div class="kayan-metin" id="blog-usd">Yükleniyor...</div></div>
            <div class="nav-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="blog.html" style="color:var(--accent-color)">Blog</a>
            </div>
        </div>
    </nav>

    <div class="blog-container">
        <div class="blog-header"><h1>Dijital Notlarım</h1><p>Yazılım ve Teknoloji Üzerine</p></div>
        <div class="blog-grid">
            <div class="blog-card" onclick="location.href='doviz-yazisi.html'">
                <img src="websiteai.png" class="blog-img">
                <div class="blog-content">
                    <h3>Döviz Bandı Nasıl Yapılır?</h3>
                    <p>JavaScript ve API kullanarak siteme canlı veri ekledim.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('https://api.exchangerate-api.com/v4/latest/USD').then(res => res.json()).then(data => {
            document.getElementById('blog-usd').innerText = `USD: ${data.rates.TRY.toFixed(2)}₺ - EUR: ${(data.rates.TRY/data.rates.EUR).toFixed(2)}₺`;
        });
    </script>
</body>
</html>
