<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berat Çetin | Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- GENEL AYARLAR --- */
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #8b5cf6;
            --card-bg: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }

        /* --- NAVİGASYON: Logoyu ve Menüyü Sabitler --- */
        nav {
            position: fixed; width: 100%; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Logo boyutu her iki sayfada da 22px olarak sabitlendi */
        .logo { font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent-color); }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent-color); }

        /* --- DÖVİZ BANDI: Kayan Yazı Animasyonu --- */
        .doviz-kapsayici {
            width: 150px; overflow: hidden; background: rgba(255,255,255,0.05);
            border-radius: 20px; padding: 5px 10px; border: 1px solid rgba(139,92,246,0.3);
        }
        .kayan-metin {
            display: flex; white-space: nowrap; font-size: 12px; color: #00ff88;
            animation: kaydir 10s linear infinite;
        }
        @keyframes kaydir { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- HERO (GİRİŞ) BÖLÜMÜ: Düzen Kayması Engellendi --- */
        section { padding: 120px 10% 60px; }
        .hero-container { display: flex; align-items: center; justify-content: space-between; min-height: 70vh; gap: 40px; }
        .hero-text { flex: 1; }
        .hero-text h1 { font-size: 50px; line-height: 1.2; }
        .hero-text span { color: var(--accent-color); }
        .hero-image { flex: 1; display: flex; justify-content: center; }
        .hero-image img { width: 350px; border-radius: 30px; box-shadow: 0 0 30px rgba(139,92,246,0.2); }

        /* --- YETENEK BARLARI: Dolmama Sorunu Çözüldü --- */
        .skills-container { background: var(--card-bg); padding: 30px; border-radius: 20px; margin-top: 30px; }
        .skill-item { margin-bottom: 20px; }
        .bar { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .progress { height: 100%; background: var(--accent-color); width: 0; transition: 1.5s ease-in-out; }

        .fade-in { opacity: 0; transform: translateY(30px); transition: 0.8s; }
        .visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Cetin<span>.Digital</span></a>
        <div class="nav-right">
            <div class="doviz-kapsayici"><div class="kayan-metin" id="usd-kuru">Yükleniyor...</div></div>
            <div class="nav-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="blog.html">Blog</a>
                <a href="#about">Hakkımda</a>
                <a href="#contact">İletişim</a>
            </div>
        </div>
    </nav>

    <section id="home">
        <div class="hero-container">
            <div class="hero-text fade-in">
                <h1>Merhaba, Ben <br><span>Berat Çetin</span></h1>
                <p>Dijital dünyada modern çözümler üreten bir geliştiriciyim.</p>
            </div>
