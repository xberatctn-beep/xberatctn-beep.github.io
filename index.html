<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berat Çetin | Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <nav>
        <a href="index.html" class="logo">Cetin<span>.Digital</span></a>
        <div class="nav-right">
            <div class="doviz-box" id="usd-rate">Yükleniyor...</div>
            <div class="nav-links">
                <a href="index.html" class="active">Ana Sayfa</a>
                <a href="blog.html">Blog</a>
                <a href="#about">Hakkımda</a>
            </div>
        </div>
    </nav>

    <section id="home">
        <div class="flex-container">
            <div class="text-side fade-in">
                <h1>Merhaba, Ben <br><span>Berat Çetin</span></h1>
                <p>Modern teknolojilerle dijital çözümler üretiyorum.</p>
            </div>
            <div class="image-side fade-in">
                <img src="beratcetinprofil.png" alt="Profil">
            </div>
        </div>
    </section>

    <section id="about" class="fade-in">
        <h2>Yeteneklerim</h2>
        <div class="skills-container">
            <div class="skill-item">
                <div style="display:flex; justify-content:space-between"><span>AI & Yapay Zeka</span><span>60%</span></div>
                <div class="bar"><div class="progress" data-done="60"></div></div>
            </div>
            <div class="skill-item">
                <div style="display:flex; justify-content:space-between"><span>Web Geliştirme</span><span>75%</span></div>
                <div class="bar"><div class="progress" data-done="75"></div></div>
            </div>
        </div>
    </section>

    <script>
        // Döviz Verisi Çekme
        fetch('https://api.exchangerate-api.com/v4/latest/USD').then(res => res.json()).then(data => {
            document.getElementById('usd-rate').innerText = `USD: ${data.rates.TRY.toFixed(2)}₺`;
        });

        // Görünme Animasyonu ve Barlar
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    e.target.classList.add('visible');
                    e.target.querySelectorAll('.progress').forEach(b => b.style.width = b.getAttribute('data-done') + '%');
                }
            });
        });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
